<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Niks Ki Rasoi Admin</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
color:#198754;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.pending{
color:orange;
font-weight:bold;
}

.order{
  background:white;
  padding:15px;
  margin:15px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.orderText{
  white-space:normal;
  line-height:1.6;
  margin-top:10px;
}

.orderText{
  white-space:pre-wrap;
  font-size:18px;
  line-height:1.6;
}

.status{
font-weight:bold;
}

.Pending{
color:#dc3545;
}

.Preparing{
color:#fd7e14;
}

.Served{
color:#198754;
}
</style>
</head>

<body>

<h1>🍽️ Niks Ki Rasoi Admin Panel</h1>
<audio id="bell" preload="auto">
  <source src="ding.mp3" type="audio/mpeg">
</audio>

<div id="orders"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDz17AZWhfnOnO-DbC4CYWsoTAv4ojgyRE",
  authDomain: "niks-ordering-system.firebaseapp.com",
  projectId: "niks-ordering-system",
  storageBucket: "niks-ordering-system.firebasestorage.app",
  messagingSenderId: "486739954103",
  appId: "1:486739954103:web:5a9818c0c117b319f78032"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let latestOrderId = "";
async function loadOrders() {

  try {

    const snapshot = await getDocs(
      collection(db, "orders")
    );
const docs = snapshot.docs.sort((a, b) => {
  const timeA = a.data().createdAt || "";
  const timeB = b.data().createdAt || "";
  return timeB.localeCompare(timeA);
});

if (docs.length > 0) {

  const newestOrderId = docs[0].id;

  if (
    latestOrderId &&
    newestOrderId !== latestOrderId
  ) {

    const bell =
      document.getElementById("bell");

    bell.currentTime = 0;

    bell.play().catch(err =>
      console.log(err)
    );

  }

  latestOrderId = newestOrderId;
}
    const container =
      document.getElementById("orders");

    container.innerHTML = "";


docs.forEach((docSnap) => {

      const order = docSnap.data();

      // Hide served orders
      if (order.status === "Served") {
        return;
      }

      container.innerHTML += `
      <div class="order">

        <h3>👤 ${order.customerName || "Unknown"}</h3>

        <p>🍽️ Table ${order.tableNumber || "-"}</p>

        <pre class="orderText">
${order.orderText || ""}
        </pre>

        <p class="status ${order.status}">
          <b>Status:</b> ${order.status}
        </p>

        <button onclick="updateStatus('${docSnap.id}','Preparing')">
          👨‍🍳 Preparing
        </button>

        <button onclick="updateStatus('${docSnap.id}','Served')">
          ✅ Served
        </button>

      </div>
      `;

    });

  } catch (error) {

    console.error(error);
    alert("Error: " + error.message);

  }

}

window.updateStatus = async function(orderId, newStatus){

  try {

    await updateDoc(
      doc(db, "orders", orderId),
      {
        status: newStatus
      }
    );

    loadOrders();

  } catch(error){

    alert(error.message);

  }

}

loadOrders();

setInterval(() => {
    loadOrders();
}, 3000);
document.addEventListener("click", () => {
  const bell = document.getElementById("bell");
  bell.play().then(() => {
    bell.pause();
    bell.currentTime = 0;
  }).catch(() => {});
}, { once: true });
</script>

</body>
</html>
